name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: financial_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pci_root_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Write test environment file
        run: |
          cat <<EOF > .env.test
          DB_HOST=127.0.0.1
          DB_USER=root
          DB_PASSWORD=ci_root_password
          DB_NAME=financial_system_test
          PORT=5001
          JWT_SECRET=ci-test-secret-not-for-production-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          CORS_ORIGIN=http://localhost:5173
          EOF

      - run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: banking-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: banking-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
