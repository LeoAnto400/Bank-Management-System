services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in a .env file, see .env.example}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./dbSyntax.sql:/schema/dbSyntax.sql:ro
      - ./auth_schema.sql:/schema/auth_schema.sql:ro
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in a .env file, see .env.example}
      DB_NAME: financial_system
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in a .env file, see .env.example}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./banking-frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
